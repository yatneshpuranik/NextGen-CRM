name: CI/CD Production Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Lint, Code Analysis, and Compiling Verification
  verify:
    name: Build & Code Verification
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRES_IN: "72h"
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # Verify Database Schema Integrity
      - name: Validate Prisma Schema
        run: |
          cd backend
          npm ci
          npx prisma validate

      # Verify Backend Compilation
      - name: Verify Backend (Lint & Build)
        run: |
          cd backend
          npm run lint || true
          npm run build

      # Verify Frontend Compilation
      - name: Verify Frontend (Lint & Build)
        env:
          VITE_API_URL: https://mock-api.onrender.com/api/v1
        run: |
          cd frontend
          npm ci
          npm run lint || true
          npm run build

